<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluebird QuizTaker</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,200&icon_names=add,home,person,quiz" />
</head>

<body>
    <nav>
        <span>
            <b>QuizTaker</b>
        </span>
        <span>
            <button>
                <i class="material-symbols-rounded">home</i>
                Home
            </button>
            <button>
                <i class="material-symbols-rounded">quiz</i>
                Quizzes
            </button>
        </span>
        <span>
            <button>
                <i class="material-symbols-rounded">add</i>
                Add A Quiz
            </button>
            <button>
                <i class="material-symbols-rounded">person</i>
                Profile
            </button>
        </span>
    </nav>
    <main>
        <h1>Recents</h1>
        <div id="recents"></div>
        <h1>All Spaces</h1>
        <div id="all-spaces"></div>
        <h1>Folders</h1>
        <div id="folders"></div>
    </main>
    <script src="script.js"></script>
</body>

</html>
