<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="wi-day-rain copy.svg" type="image/x-icon">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
        integrity="sha512-NhLySQDkiKSKnT+R795uaHWRQ7D3VuIvgeOLCK8cWq4w5fq4sWF90gj8eURpTqn/f1mFzqClpOz8JPlgVTLfFw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.css"
        integrity="sha512-WrHplq3TYPEkwmx3iOWybuK9tQ4oq6Qxff1aM48V2RI4CHPU3zBXebikfBsSf+/pMwc6vNUaMQLtwG7KUoP+kA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="manifest" href="/manifest.json">
    <title>Bluebird Weather — Smarter Weather Starts Here</title>
</head>

<body>
    <div id="notification"></div>
    <nav class="mainNavbar">
        <span class="left-nav">
            <h1 id="location-header">
                <a href="">
                    <i class="wi wi-day-rain"></i>
                    Weather
                </a>
            </h1>
            <div class="location">
            </div>
        </span>
        <span class="right-nav">
            <button class="material-symbols-rounded" onclick="openSearch()">search</button>
            <button id="account-btn">
                <i class="material-symbols-rounded">person</i>
            </button>
        </span>
    </nav>
    <section id="main-head"
        style="background: url('https://rare-gallery.com/uploads/posts/574899-beach-ocean.jpg'); background-repeat: no-repeat; background-size: cover; background-position: center;">
        <div class="center-cont">
            <h1 id="head-motto">Welcome to Bluebird Weather!</h1>
            <div style="display: flex; justify-content: center;">

                <div class="search-holder" id="search-head" onclick="openSearch()">
                    <i class="material-symbols-rounded">partly_cloudy_day</i>
                    <div id="search-locations">Search for Locations, News, and Alerts</div>
                    <button class="material-symbols-rounded">search</button>
                </div>
            </div>
        </div>
    </section>
    <main id="main-content">
        <section class="alerts-section">
            <h2 class="section-header" id="weather-alert-header"> <i class="material-symbols-rounded">warning</i>
                Weather Alerts in your State
            </h2>
            <div id="state-weather-alerts"></div>
            <p>Weather alerts brought to you by the NWS.</p>
        </section>
        <section class="news-section">
            <div class="news-header">
                <h2 class="section-header"> <i class="material-symbols-rounded">news</i> Your News Feed</h2>
                <span style="display: flex; gap: 7px;">
                    <button><i class="material-symbols-rounded">sort</i> <span>Sort</span> </button>
                    <button id="refresh-news-btn" onclick="loadWeatherNewsContent(true);"><i
                            class="material-symbols-rounded">refresh</i>
                        <span>Refresh</span> </button>
                    <button><i class="material-symbols-rounded">edit</i> <span>Edit Feed</span> </button>
                </span>
            </div>
            <div id="weather-news-feed"></div>
        </section>
    </main>
</body>
<script src="script.js"></script>
<script src="search.js"></script>

</html>
