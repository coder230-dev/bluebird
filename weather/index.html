<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
        integrity="sha512-NhLySQDkiKSKnT+R795uaHWRQ7D3VuIvgeOLCK8cWq4w5fq4sWF90gj8eURpTqn/f1mFzqClpOz8JPlgVTLfFw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.css"
        integrity="sha512-WrHplq3TYPEkwmx3iOWybuK9tQ4oq6Qxff1aM48V2RI4CHPU3zBXebikfBsSf+/pMwc6vNUaMQLtwG7KUoP+kA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="manifest" href="/manifest.json">
    <title>Bluebird Weather — Smarter Weather Starts Here</title>
</head>

<body>
    <div id="notification"></div>
    <main id="main-content">
        <aside class="sidebar">
            <header style="display: flex; align-items: center;" class="">
                <i class="wi wi-day-sunny-overcast"></i>
                <b style="padding: 0; margin: 0;">Bluebird Weather</b>
            </header>
            <div id="searchBarNavCont" style="margin-bottom: 10px;">
                <div class="top-cont ">
                    <i class="material-symbols-rounded">search</i>
                    <input placeholder="Search For Locations, Coordinates, and Alerts" type="search" id="searchBarNav">
                </div>
                <div id="search-loading" class="search-loading-bar" style="display:none;height:3px;"></div>
                <div id="nav-search-results" style="display: none;"></div>
            </div>
            <!-- Main Nav Links -->
            <button class="active"><i class="material-symbols-rounded">home</i> Home</button>
            <div class="location-cont">
                <button id="location-dropdown"><i class="material-symbols-rounded">location_on</i> Locations <i class="material-symbols-rounded arrow">arrow_drop_down</i></button>
                <div id="all-locations-dropdown">
                    <button>Sacramento, CA</button>
                </div>
            </div>
            <button id="settings-btn" class=""><i class="material-symbols-rounded">settings</i> Settings</button>
        </aside>
        <div class="right">
            <div id="search-alert-cont"></div>
            <div id="state-weather-alerts">
                <span class="loader-d">
                    <svg viewBox="25 25 50 50" class="loader">
                        <circle r="20" cy="50" cx="50"></circle>
                    </svg>
                </span>
            </div>
        </div>
        <footer style="grid-area: footer;">
            <h5>2026 Bluebird IPE</h5>

            All weather data from Open Meteo. Alerts, weather images, and stories from weather.gov. Images from
            PublicDomainPicutres and from Google Search Results (Creative Commons Licences). Location data mostly from
            the
            Big Data Cloud API.
        </footer>
    </main>
</body>
<script src="script.js"></script>
<script src="search.js"></script>

</html>
