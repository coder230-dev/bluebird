<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games on Inspire</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Special+Gothic+Expanded+One&display=swap');
        html {
            padding: 6px;
            margin: 0;
            background: url('content/a\ background\ for\ a\ online\ \(web\)\ game\ website\ that\ is\ stunning.jpeg');
        }
        body {
            background: rgba(68, 68, 68, 0.388);
            backdrop-filter: blur(5px);
            border-radius: 55px;
            padding: 12px;
            color: white;
            min-height: calc(100vh - 50px) !important;
            font-family: "Poppins";
        }
        .box {
            border: 1px solid cyan;
            padding: 12px;
            border-radius: 35px;
        }
        h1 {
            font-family: "Special Gothic Expanded One";
        }
        .flexSection {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-radius: 35px;
            gap: 20px;
            img {
                border-radius: 90px;
                height: 5rem;
                padding: 6px;
            }
            span {
                border-radius: 35px;
                border: 1px solid white;
                padding: 12px;
                width: 100%;
                min-height: 200px;
                progress {
                    width: 100%;
                }
            }
            h2 {
                padding: 0;
                margin: 0;
                align-items: center;
                display: flex;
                i {
                    padding: 6px;
                }
            }
            button, a {
                border-radius: 90px;
                text-decoration: none;
                padding: 12px;
                border: 1px solid magenta;
                background: none;
                color: white;
                font-family: "Poppins";
                cursor: pointer;
                font-weight: 610;
            }
            ::-webkit-progress-value {
                appearance: none;
            }
        }
        progress {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 20px;
            border: none;
            border-radius: 10px;
            background-color: #eee;
        }
        progress::-webkit-progress-bar {
            background-color: #eee;
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background: linear-gradient(to right, rgb(2, 201, 201), rgb(1, 203, 1));
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;"><i style="font-size: 5rem;" class="material-symbols-rounded">playing_cards</i></h1>
    <h1 style="text-align: center;">Inspire Games</h1>
    <div id="account-details" class="box">
        <h1>Hi there</h1>
    </div>
    <h2>All Games</h2>
    <div id="all-games-wrapper">

    </div>
</body>
<script>
    var currentUser = JSON.parse(localStorage.getItem('currentUser'))
    if (!currentUser) {
        currentUser = undefined
    }
    window.onload = () => {
        document.getElementById('account-details').innerHTML = `
        <div style="border: 1px solid lime" class="flexSection">
            <h2>${currentUser.avatarPath || `<i class="material-symbols-rounded">sports_esports</i>`} Hi there ${currentUser.username}</h2>
            <a href="../account/index.html">Switch User</a>
        </div>
        <div class="flexSection">
            <span>
                <h2><i class="material-symbols-rounded">stat_2</i>Level ${currentUser.level || 'Start Playing to Level Up'}</h2>
                <p>${currentUser.xpLevel || 0} / 100xp</p>
                <progress max="100" value="${currentUser.xpLevel || 0}"></progress>
                <p>${100 - (currentUser.xpLevel || 0)}xp to level <strong>${(currentUser.xpLevel || 0) + 1}</strong></p>
            </span>
            <span>
                <h2>Multiplier Right Now</h2>
                <p>Couldn't get Multiplier. Check in game to see current multiplier</p>
            </span>
        </div>`
    }
</script>
</html>
